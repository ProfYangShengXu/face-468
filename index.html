<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face 468 — 面部关键点采集器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --panel: #12121a;
  --border: #1e1e2e;
  --text: #c8c8d4;
  --accent: #00ff64;
  --accent-dim: rgba(0, 255, 100, 0.15);
  --danger: #ff4466;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
  overflow: hidden;
  height: 100dvh;
  width: 100dvw;
  user-select: none;
  -webkit-user-select: none;
}

#canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  z-index: 0;
}

/* ── HUD (top bar) ── */
#hud {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  display: flex;
  gap: 12px;
  pointer-events: none;
}
.stat-card {
  background: rgba(10,10,20,0.85);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  min-width: 80px;
  text-align: center;
}
.stat-card .val {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  font-family: inherit;
}
.stat-card .lbl {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ── Controls (bottom bar) ── */
#controls {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 10px;
  align-items: center;
  background: rgba(10,10,20,0.9);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 18px;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.5px;
}
button:active { transform: scale(0.96); }

.btn-rec {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(0,255,100,0.3);
}
.btn-rec:hover { background: rgba(0,255,100,0.2); }
.btn-rec.active {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,68,102,0.5); }
  50%     { box-shadow: 0 0 0 10px rgba(255,68,102,0); }
}

.btn-export {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 800;
}
.btn-export:hover { filter: brightness(1.2); }

.btn-clear {
  background: transparent;
  color: #888;
}
.btn-clear:hover { color: #fff; border-color: #555; }

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #999;
}
.ctrl-group input[type=range] {
  width: 80px;
  accent-color: var(--accent);
  height: 4px;
}
.ctrl-group input[type=checkbox] {
  accent-color: var(--accent);
}

.sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

/* ── Loading overlay ── */
#loading {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  transition: opacity 0.4s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading .msg {
  font-size: 13px;
  color: #888;
  letter-spacing: 1px;
}

/* ── Toast ── */
#toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%) scale(0.8);
  background: rgba(0,0,0,0.9);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 12px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: all 0.2s;
}
#toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted style="display:none"></video>
<canvas id="canvas"></canvas>

<!-- HUD: stats -->
<div id="hud">
  <div class="stat-card"><div class="val" id="stat-fps">--</div><div class="lbl">FPS</div></div>
  <div class="stat-card"><div class="val" id="stat-frames">0</div><div class="lbl">帧数</div></div>
  <div class="stat-card"><div class="val" id="stat-sec">0.0</div><div class="lbl">秒</div></div>
  <div class="stat-card"><div class="val" id="stat-face">⦻</div><div class="lbl">人脸</div></div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="btn-rec" id="btnRec">⏺ 开始录制</button>
  <button class="btn-export" id="btnExport" disabled>⬇ 导出 JSON</button>
  <button class="btn-clear" id="btnClear">清空</button>
  <span class="sep"></span>
  <div class="ctrl-group">
    缓冲 <input type="range" id="bufferSlider" min="3" max="30" value="10" step="1">
    <span id="bufferLabel" style="min-width:24px;color:var(--accent)">10</span>s
  </div>
  <span class="sep"></span>
  <div class="ctrl-group">
    <input type="checkbox" id="chkMesh" checked> 网格
  </div>
  <div class="ctrl-group">
    <input type="checkbox" id="chkDots"> 关键点
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="msg" id="loadMsg">加载 MediaPipe Face Mesh…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- MediaPipe Face Mesh CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let recording = false;
let bufferSec = 10;        // seconds
let buffer = [];           // {t, lm: [[x,y,z],...]}
let faceLandmarks = null;  // latest raw landmarks for rendering
let showMesh = true;
let showDots = false;
let fpsCounter = { frames: 0, lastTime: performance.now(), value: 0 };
const EST_FPS = 30;        // estimated FPS for buffer size calculation
const IRIS_START = 468;    // iris landmark index start (with refineLandmarks)

// ──────────────────────────────────────────────
//  DOM refs
// ──────────────────────────────────────────────
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const loading     = document.getElementById('loading');
const loadMsg     = document.getElementById('loadMsg');
const toast       = document.getElementById('toast');

const btnRec      = document.getElementById('btnRec');
const btnExport   = document.getElementById('btnExport');
const btnClear    = document.getElementById('btnClear');
const statFps     = document.getElementById('stat-fps');
const statFrames  = document.getElementById('stat-frames');
const statSec     = document.getElementById('stat-sec');
const statFace    = document.getElementById('stat-face');
const bufferSlider = document.getElementById('bufferSlider');
const bufferLabel = document.getElementById('bufferLabel');
const chkMesh     = document.getElementById('chkMesh');
const chkDots     = document.getElementById('chkDots');

// ──────────────────────────────────────────────
//  RESIZE
// ──────────────────────────────────────────────
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

// ──────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────
let toastTimer;
function showToast(msg, duration=1500) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

// ──────────────────────────────────────────────
//  FPS
// ──────────────────────────────────────────────
function tickFPS() {
  fpsCounter.frames++;
  const now = performance.now();
  const elapsed = now - fpsCounter.lastTime;
  if (elapsed >= 500) {
    fpsCounter.value = Math.round(fpsCounter.frames / (elapsed / 1000));
    fpsCounter.frames = 0;
    fpsCounter.lastTime = now;
    statFps.textContent = fpsCounter.value;
  }
}

// ──────────────────────────────────────────────
//  RENDER: draw video + face mesh on canvas
// ──────────────────────────────────────────────
function render() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Mirrored video background
  ctx.save();
  ctx.translate(w, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, w, h);
  ctx.restore();

  if (!faceLandmarks || faceLandmarks.length === 0) return;

  const lm = faceLandmarks;

  // Tessellation edges (triangulated face mesh)
  const tess = (typeof FaceMesh !== 'undefined' && FaceMesh.FACEMESH_TESSELATION)
    ? FaceMesh.FACEMESH_TESSELATION
    : [];

  if (showMesh && tess.length > 0) {
    ctx.strokeStyle = 'rgba(0, 255, 100, 0.35)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    for (const pair of tess) {
      const a = pair[0], b = pair[1];
      if (a >= lm.length || b >= lm.length) continue;
      // Mirror x for display
      const x1 = (1 - lm[a].x) * w;
      const y1 = lm[a].y * h;
      const x2 = (1 - lm[b].x) * w;
      const y2 = lm[b].y * h;
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
    }
    ctx.stroke();
  }

  // Keypoints
  if (showDots) {
    ctx.fillStyle = '#00ff64';
    for (let i = 0; i < lm.length; i++) {
      const x = (1 - lm[i].x) * w;
      const y = lm[i].y * h;
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // Highlight iris landmarks (indices 468-477 if refineLandmarks adds them)
    // Actually MediaPipe Face Mesh has exactly 468 landmarks with refineLandmarks
    // The indices 468-477 are the iris landmarks. Standard 468 = 0-467.
    // With refineLandmarks: additional 10 iris points → total 478.
    // Let's highlight them if they exist.
    if (lm.length > IRIS_START) {
      ctx.fillStyle = '#ffcc00';
      for (let i = IRIS_START; i < lm.length; i++) {
        const x = (1 - lm[i].x) * w;
        const y = lm[i].y * h;
        ctx.beginPath();
        ctx.arc(x, y, 2.0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

// ──────────────────────────────────────────────
//  BUFFER
// ──────────────────────────────────────────────
function getMaxFrames() { return bufferSec * EST_FPS; }

function addToBuffer(landmarks) {
  const frame = {
    t: performance.now() / 1000,           // absolute timestamp
    lm: landmarks.map(l => [l.x, l.y, l.z])  // original coords (not mirrored)
  };
  buffer.push(frame);
  // Trim to buffer size
  const maxFrames = getMaxFrames();
  while (buffer.length > maxFrames) {
    buffer.shift();
  }
  updateStats();
}

// Normalize timestamps relative to first frame
function normalizedBuffer() {
  if (buffer.length === 0) return [];
  const t0 = buffer[0].t;
  return buffer.map(f => ({ t: +(f.t - t0).toFixed(4), lm: f.lm }));
}

function updateStats() {
  statFrames.textContent = buffer.length;
  if (buffer.length >= 2) {
    statSec.textContent = (buffer[buffer.length - 1].t - buffer[0].t).toFixed(1);
  }
  btnExport.disabled = buffer.length === 0;
}

// ──────────────────────────────────────────────
//  EXPORT
// ──────────────────────────────────────────────
function exportJSON() {
  const frames = normalizedBuffer();
  if (frames.length === 0) { showToast('⚠ 无数据可导出'); return; }

  // 获取三角拓扑 (MediaPipe FACEMESH_TESSELATION)
  let tessellation = [];
  if (typeof FaceMesh !== 'undefined' && FaceMesh.FACEMESH_TESSELATION) {
    tessellation = FaceMesh.FACEMESH_TESSELATION.map(p => [p[0], p[1]]);
  }

  const avgFps = frames.length / (frames[frames.length - 1].t || (1 / EST_FPS));
  const data = {
    meta: {
      version: '2.0',
      landmark_count: frames[0].lm.length,
      fps: Math.round(avgFps),
      frame_count: frames.length,
      duration_sec: +frames[frames.length - 1].t.toFixed(2)
    },
    tessellation: tessellation,
    frames: frames
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'face_capture.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 已导出 face_capture.json');
}

// ──────────────────────────────────────────────
//  MEDIAPIPE ON-RESULTS
// ──────────────────────────────────────────────
function onResults(results) {
  tickFPS();

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    faceLandmarks = results.multiFaceLandmarks[0];
    statFace.innerHTML = '<span style="color:var(--accent)">●</span>';

    if (recording) {
      addToBuffer(faceLandmarks);
    }
  } else {
    faceLandmarks = null;
    statFace.innerHTML = '<span style="color:#555">○</span>';
  }

  render();

  // Schedule next frame
  if (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
    requestAnimationFrame(() => {
      faceMesh.send({ image: video }).catch(err => console.warn('[FaceMesh] send error:', err));
    });
  }
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
let faceMesh;

async function init() {
  try {
    // 1. Camera
    loadMsg.textContent = '请求摄像头权限…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    video.srcObject = stream;
    await video.play();
    resize();
    loadMsg.textContent = '摄像头就绪 — 加载 WASM 模型…';

    // 2. MediaPipe Face Mesh
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`
    });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onResults);

    // 3. Kick off loop
    loadMsg.textContent = '启动推理循环…';
    await faceMesh.send({ image: video });

    // Hide loading
    loading.classList.add('hidden');
    showToast('🚀 Face 468 就绪');
  } catch (err) {
    loadMsg.innerHTML = `<span style="color:var(--danger)">❌ 初始化失败</span><br><small>${err.message}</small>`;
    console.error(err);
  }
}

// ──────────────────────────────────────────────
//  UI BINDINGS
// ──────────────────────────────────────────────
btnRec.addEventListener('click', () => {
  recording = !recording;
  if (recording) {
    buffer = []; // reset buffer on new recording
    btnRec.textContent = '⏹ 停止录制';
    btnRec.classList.add('active');
    showToast('⏺ 录制开始');
    updateStats();
  } else {
    btnRec.textContent = '⏺ 开始录制';
    btnRec.classList.remove('active');
    showToast(`⏹ 录制停止 — 共 ${buffer.length} 帧`);
    updateStats();
  }
});

btnExport.addEventListener('click', exportJSON);

btnClear.addEventListener('click', () => {
  buffer = [];
  updateStats();
  statFrames.textContent = '0';
  statSec.textContent = '0.0';
  showToast('🗑 已清空');
});

bufferSlider.addEventListener('input', () => {
  bufferSec = parseInt(bufferSlider.value);
  bufferLabel.textContent = bufferSec;
  // Trim existing buffer to new size
  const maxFrames = getMaxFrames();
  while (buffer.length > maxFrames) buffer.shift();
  updateStats();
});

chkMesh.addEventListener('change', () => { showMesh = chkMesh.checked; });
chkDots.addEventListener('change', () => { showDots = chkDots.checked; });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  switch (e.key.toLowerCase()) {
    case 'r': btnRec.click(); break;
    case 'e': if (!e.ctrlKey && !e.metaKey) { e.preventDefault(); exportJSON(); } break;
    case 'm': chkMesh.checked = !chkMesh.checked; showMesh = chkMesh.checked; break;
    case 'd': chkDots.checked = !chkDots.checked; showDots = chkDots.checked; break;
  }
});

// ──────────────────────────────────────────────
//  LAUNCH
// ──────────────────────────────────────────────
init();
</script>
</body>
</html>
